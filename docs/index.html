<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Biograph Product Documentation</title>
  <meta name="description" content="Biograph Healthcare Information System - Product Documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #0D9488;
      --sidebar-width: 300px;
      --sidebar-nav-link-color--active: #0D9488;
      --sidebar-nav-link-font-weight--active: 600;
      --heading-color: #1E293B;
      --link-color: #0D9488;
      --cover-background-color: #0D9488;
    }
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      margin: 1.2em 0 0.4em;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #475569;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section table th {
      background-color: #f1f5f9;
      font-weight: 600;
    }
    .app-name-link img {
      max-width: 100%;
    }
    .cover-main {
      color: #fff;
    }
    .docsify-pagination-container {
    font-family: inherit !important;
    margin-top: 0 !important;
    }
    .markdown-section pre {
    margin-bottom: 0;
    }
    .markdown-section img {
    border: 1px solid #e9ecef;
    border-radius: 8px;
    }
    </style>
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Biograph Docs',
      repo: 'Tacten/biograph',
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'getting-started/overview.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
        pathNamespaces: ['/']
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
